<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login — KLN College of Engineering</title>
<link rel="icon" type="image/gif" href="college_logo.gif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233F;
    --navy-2:#233A63;
    --brass:#C9A227;
    --paper:#EAECF1;
    --paper-2:#F6F7FA;
    --ink:#1B1F27;
    --ink-soft:#4B5568;
    --line:#B9C0CF;
    --error:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  h1,h2{font-family:'Source Serif 4',serif;}

  .card{
    width:100%; max-width:960px;
    display:grid; grid-template-columns:1fr 1fr;
    border:2px solid var(--navy);
    position:relative;
    background:var(--paper-2);
    min-height:560px;
  }
  .card::before{
    content:""; position:absolute; inset:8px;
    border:1px solid var(--line); pointer-events:none;
  }
  .corner{position:absolute; width:14px; height:14px; border:2px solid var(--brass); z-index:2;}
  .corner.tl{top:-2px;left:-2px;border-right:none;border-bottom:none;}
  .corner.tr{top:-2px;right:-2px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:-2px;left:-2px;border-right:none;border-top:none;}
  .corner.br{bottom:-2px;right:-2px;border-left:none;border-top:none;}

  /* left panel: identity */
  .side{
    background:
      linear-gradient(var(--navy), var(--navy)),
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(255,255,255,.05) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(255,255,255,.05) 28px);
    color:var(--paper-2);
    padding:48px 40px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .side .logo-wrap{
    width:84px; height:84px; border-radius:50%;
    border:2px solid var(--brass);
    background:var(--paper-2);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .side .logo-wrap img{width:100%;height:100%;object-fit:cover;}
  .side .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:.75rem; letter-spacing:.18em;
    color:var(--brass); text-transform:uppercase; margin-top:32px; margin-bottom:14px;
  }
  .side h1{font-size:1.7rem; line-height:1.25; max-width:320px;}
  .side .foot{
    font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:#8C97B3;
    border-top:1px solid rgba(255,255,255,.2); padding-top:16px;
  }

  /* right panel: form */
  .form-side{
    padding:48px 44px;
    display:flex; flex-direction:column; justify-content:center;
  }
  .form-side .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:.75rem; letter-spacing:.16em;
    text-transform:uppercase; color:var(--navy-2); margin-bottom:10px;
  }
  .form-side h2{font-size:1.5rem; color:var(--navy); margin-bottom:6px;}
  .form-side .sub{color:var(--ink-soft); font-size:.92rem; margin-bottom:30px;}

  label{
    font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-soft); display:block; margin-bottom:6px;
  }
  .field{margin-bottom:20px;}
  input{
    width:100%; padding:12px 14px; font-size:.95rem;
    border:1px solid var(--line); background:#fff; color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
  }
  input:focus{outline:2px solid var(--brass); outline-offset:1px; border-color:var(--brass);}

  .row-between{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; font-size:.85rem;}
  .row-between label.check{
    display:flex; align-items:center; gap:8px; text-transform:none;
    font-family:'IBM Plex Sans',sans-serif; letter-spacing:0; color:var(--ink-soft);
  }
  .row-between a{color:var(--navy-2); text-decoration:none; font-weight:500;}
  .row-between a:hover{text-decoration:underline;}

  .btn{
    width:100%; padding:14px; font-size:.95rem; font-weight:500;
    background:var(--brass); color:var(--navy); border:1px solid var(--brass);
    cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:transform .15s ease;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:focus-visible{outline:2px solid var(--navy); outline-offset:3px;}

  .error-msg{
    display:none; background:#FBEAE8; border:1px solid var(--error); color:var(--error);
    padding:10px 14px; font-size:.85rem; margin-bottom:18px;
  }
  .error-msg.show{display:block;}

  .back-link{
    display:inline-block; margin-top:24px; font-size:.85rem; color:var(--ink-soft); text-decoration:none;
  }
  .back-link:hover{color:var(--navy-2);}

  @media (max-width:720px){
    .card{grid-template-columns:1fr;}
    .side{padding:32px;}
    .side h1{font-size:1.4rem;}
  }
</style>
</head>
<body>

<div class="card">
  <span class="corner tl"></span><span class="corner tr"></span>
  <span class="corner bl"></span><span class="corner br"></span>

  <div class="side">
    <div>
      <div class="logo-wrap"><img src="logo.png" alt="KLN College of Engineering logo"></div>
      <div class="eyebrow">Student Portal</div>
      <h1>KLN College of Engineering</h1>
    </div>
    <div class="foot">Sheet No. 02 — Access Control</div>
  </div>

  <div class="form-side">
    <div class="eyebrow">§ Login</div>
    <h2>Sign in to your account</h2>
    <p class="sub">Use your college-issued register number and password.</p>

    <div class="error-msg" id="errorMsg">Invalid register number or password. Please try again.</div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field">
        <label for="regno">Register Number</label>
        <input type="text" id="regno" name="regno" placeholder="e.g. 21CS0123" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="row-between">
        <label class="check"><input type="checkbox" style="width:auto;"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>

    <a href="index.html" class="back-link">&larr; Back to college website</a>
  </div>
</div>

<script>
  // Placeholder auth logic — replace with a real backend call.
  function handleLogin(e){
    e.preventDefault();
    const regno = document.getElementById('regno').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if(regno && password){
      errorMsg.classList.remove('show');
      alert('Login placeholder — connect this form to your real student database / backend to authenticate "' + regno + '".');
    } else {
      errorMsg.classList.add('show');
    }
    return false;
  }
</script>

</body>
</html>
